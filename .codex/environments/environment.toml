# Codex repository-local configuration for EmpirePicks

[project]
name = "EmpirePicks"
root = "."

[environment]
node_version = "20"
package_manager = "npm"

[commands]
setup = "npm ci"
dev = "npm run dev"
lint = "npm run lint"
typecheck = "npm run typecheck"
test = "npm test"
build = "npm run build"
start = "npm run start"

[context]
instructions_files = ["AGENTS.md"]
important_paths = [
  "app",
  "lib/server",
  "lib/server/odds",
  "scripts",
]

[standards]
typescript_strict = true
avoid_any = true
prefer_functional_components = true
explicit_return_types = true

[guardrails]
minimal_changes = true
preserve_api_shapes = true
preserve_odds_math_pipeline = true
require_tests_for_odds_math_changes = true
never_commit_secrets = true
env_files = [".env.local"]

[verification]
required = [
  "npm run lint",
  "npm run typecheck",
  "npm test",
  "npm run build",
]

[domain]
summary = "Sports odds aggregation and betting analytics platform with fair market probability, vig removal, expected value, and line shopping."

[notes]
default_fair_model = "weighted"
default_min_books = 4